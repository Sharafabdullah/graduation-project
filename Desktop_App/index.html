<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Control</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══════════════ TOP MENU BAR ═══════════════ -->
  <header id="titlebar">
    <div class="titlebar-left">
      <svg class="app-icon" viewBox="0 0 24 24" width="26" height="26">
        <path fill="#007ACC" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/>
      </svg>
      <span class="app-title">Platform Control</span>
    </div>
    <nav class="menu-bar">
      <button class="menu-item">File</button>
      <button class="menu-item">Edit</button>
      <button class="menu-item">View</button>
      <button class="menu-item">Settings</button>
      <button class="menu-item">Help</button>
    </nav>
    <div class="titlebar-right">
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
      </button>
      <div class="avatar">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/></svg>
      </div>
    </div>
  </header>

  <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
  <main class="dashboard">

    <!-- ─────── LEFT COLUMN ─────── -->
    <div class="column column-left">

      <!-- Connection Card -->
      <section class="card">
        <h2 class="section-header">Connection</h2>
        <div class="form-row">
          <label>Serial Port</label>
          <select id="serialPortSelect">
            <option value="">-- Select Port --</option>
          </select>
          <button class="btn-icon-sm" id="refreshPortsBtn" title="Refresh ports">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
          </button>
        </div>
        <div class="form-row">
          <label>Baud Rate</label>
          <input type="text" id="baudRateInput" value="115200">
        </div>
        <div class="button-group">
          <button class="btn btn-primary" id="connectBtn">Connect</button>
          <button class="btn btn-secondary" id="disconnectBtn">Disconnect</button>
        </div>
        <div class="status-indicator" id="connectionStatus">
          <span class="status-dot disconnected"></span>
          <span id="statusText">Status: Disconnected</span>
        </div>
      </section>

      <!-- Machine Settings Card -->
      <section class="card">
        <h2 class="section-header">Machine Settings</h2>
        <div class="form-row">
          <label>Steps/mm (X)</label>
          <input type="number" id="stepsPerMmX" value="200">
        </div>
        <div class="form-row">
          <label>Steps/mm (Y)</label>
          <input type="number" id="stepsPerMmY" value="200">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="enableLimitSwitches" checked>
          <label for="enableLimitSwitches">Enable Limit Switches</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="enableHoming">
          <label for="enableHoming">Enable Homing</label>
        </div>
        <button class="btn btn-primary full-width" id="saveSettingsBtn">Save Settings</button>
      </section>
    </div>

    <!-- ─────── MIDDLE COLUMN ─────── -->
    <div class="column column-center">

      <!-- Manual Jog Controls Card -->
      <section class="card">
        <h2 class="section-header">Manual Jog Controls</h2>
        <div class="form-row">
          <label>Jog Increment (mm)</label>
          <select id="jogIncrement">
            <option value="0.01">0.01</option>
            <option value="0.1" selected>0.1</option>
            <option value="1">1</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="jog-pad">
          <div class="jog-row">
            <div class="jog-spacer"></div>
            <button class="btn btn-primary jog-btn" id="jogUp" title="Move Y+">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41,15.41L12,10.83L16.59,15.41L18,14L12,8L6,14L7.41,15.41Z"/></svg>
            </button>
            <div class="jog-spacer"></div>
          </div>
          <div class="jog-row">
            <button class="btn btn-primary jog-btn" id="jogLeft" title="Move X-">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.41,16.58L10.83,12L15.41,7.41L14,6L8,12L14,18L15.41,16.58Z"/></svg>
            </button>
            <button class="btn btn-secondary jog-btn jog-center" id="jogCenter" title="Center / Home">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M3.05,13H1V11H3.05C3.5,6.83 6.83,3.5 11,3.05V1H13V3.05C17.17,3.5 20.5,6.83 20.95,11H23V13H20.95C20.5,17.17 17.17,20.5 13,20.95V23H11V20.95C6.83,20.5 3.5,17.17 3.05,13M12,5A7,7 0 0,0 5,12A7,7 0 0,0 12,19A7,7 0 0,0 19,12A7,7 0 0,0 12,5Z"/></svg>
            </button>
            <button class="btn btn-primary jog-btn" id="jogRight" title="Move X+">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
            </button>
          </div>
          <div class="jog-row">
            <div class="jog-spacer"></div>
            <button class="btn btn-primary jog-btn" id="jogDown" title="Move Y-">
              <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/></svg>
            </button>
            <div class="jog-spacer"></div>
          </div>
        </div>
      </section>

      <!-- Isolated Console Card -->
      <section class="card" style="flex: 1; padding: 12px; gap: 8px;">
        <div class="form-row" style="display: flex; gap: 8px;">
          <input type="text" id="rawGcodeInput" placeholder="Enter G-code (try: G28 or M3 S90)" style="flex: 1;">
          <button class="btn btn-primary" id="sendRawBtn">Send</button>
        </div>
        <div class="console-output" id="consoleOutput" style="border-radius: var(--radius-sm); border: 1px solid var(--border); overflow-y: auto;">
          <div class="console-line">[--:--:--] Waiting for connection...</div>
        </div>
      </section>
    </div>

    <!-- ─────── RIGHT COLUMN ─────── -->
    <div class="column column-right">

      <!-- G-Code File Card -->
      <section class="card">
        <h2 class="section-header">G-Code File</h2>
        <button class="btn btn-primary full-width" id="loadGCodeBtn">Load G-Code File</button>
        <div class="file-list" id="fileList">
          <div class="file-item placeholder-item">
            <span class="file-name">No file loaded</span>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-label">
            <span>Job Progress</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
        </div>
        <div class="button-group gcode-controls">
          <button class="btn btn-primary btn-sm" id="startBtn">▶ Start</button>
          <button class="btn btn-secondary btn-sm" id="pauseBtn">⏸ Pause</button>
          <button class="btn btn-secondary btn-sm" id="resumeBtn">▶ Resume</button>
          <button class="btn btn-secondary btn-sm" id="stopBtn">⏹ Stop</button>
        </div>
      </section>

      <!-- Go To Position & Status Card -->
      <section class="card">
        <h2 class="section-header">Position & Status</h2>
        
        <div class="status-grid" style="margin-bottom: 8px;">
          <div class="status-cell">
            <span class="status-cell-label">Current X</span>
            <span class="status-cell-value" id="currentX">0.00 mm</span>
          </div>
          <div class="status-cell">
            <span class="status-cell-label">Current Y</span>
            <span class="status-cell-value" id="currentY">0.00 mm</span>
          </div>
          <div class="status-cell">
            <span class="status-cell-label">Feed Rate</span>
            <span class="status-cell-value" id="feedRate">0 mm/min</span>
          </div>
          <div class="status-cell">
            <span class="status-cell-label">Spindle Speed</span>
            <span class="status-cell-value" id="spindleSpeed">0 RPM</span>
          </div>
        </div>
        
        <div class="form-row-inline">
          <div class="form-field">
            <label>Go To X</label>
            <input type="number" id="goToX" value="0.00" step="0.01">
          </div>
          <div class="form-field">
            <label>Go To Y</label>
            <input type="number" id="goToY" value="0.00" step="0.01">
          </div>
        </div>
        <div class="button-group">
          <button class="btn btn-primary full-width" id="goBtn">Go</button>
          <button class="btn btn-secondary full-width" id="homeBtn">Home</button>
        </div>
      </section>
    </div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
